---
# Minimal Kafka Streams pipeline:
#   Producer → [input] → Kafka Streams App → [output] → Kafka Connect → Elasticsearch
#
# Build:  docker compose build
# Start:  docker compose up -d
#
# Produce a test event:
#   docker compose exec kafka kafka-console-producer \
#     --bootstrap-server localhost:9092 --topic input
#
# Query results in ES:
#   curl http://localhost:9200/output/_search?pretty

version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT       — used inside Docker on port 29092 (service-to-service)
      # PLAINTEXT_HOST  — used from the host machine on port 9092 (localhost:9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  # Creates application topics once Kafka is ready; restarts until it succeeds.
  kafka-init:
    image: confluentinc/cp-kafka:7.4.3
    depends_on:
      - kafka
    restart: on-failure
    entrypoint: >
      sh -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic input  --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic output --partitions 1 --replication-factor 1
      "

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.16
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  connect:
    build: ./connect
    depends_on:
      - kafka
      - elasticsearch
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components

  # Registers the ES sink connector once Connect is ready; restarts until it succeeds.
  connect-init:
    image: curlimages/curl:8.4.0
    depends_on:
      - connect
    restart: on-failure
    entrypoint:
      - sh
      - -c
      - |
        until curl -sf http://connect:8083/connectors; do sleep 5; done &&
        curl -s -X POST http://connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d '{"name":"es-sink","config":{"connector.class":"io.confluent.connect.elasticsearch.ElasticsearchSinkConnector","tasks.max":"1","topics":"output","connection.url":"http://elasticsearch:9200","type.name":"_doc","key.ignore":"true","schema.ignore":"true"}}'

  streams-app:
    build: ./streams-app
    depends_on:
      - kafka
    restart: unless-stopped
    ports:
      - "9404:9404"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      INPUT_TOPIC: input
      OUTPUT_TOPIC: output

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    command: --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    depends_on:
      - kafka
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    depends_on:
      - prometheus
    restart: unless-stopped
